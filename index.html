<style>
:root {
  --bg:       #0b0e13;
  --bg-card:  #141920;
  --border:   #1e2530;
  --text:     #e6edf3;
  --text-dim: #8b949e;
  --accent:   #e3b341;
  --accent2:  #79c0ff;
  --green:    #3fb950;
  --red:      #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Pretendard Variable", Pretendard,
               "Apple SD Gothic Neo", BlinkMacSystemFont, system-ui, sans-serif;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  height: 50px; flex-shrink: 0;
}
.h-brand { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: 0.1em; }
.h-sep   { width: 1px; height: 18px; background: var(--border); flex-shrink:0; }
.h-meta  { font-size: 11px; color: var(--text-dim); }
.h-breadcrumb { font-size: 13px; color: var(--text-dim); }
.h-breadcrumb b { color: var(--text); font-weight: 700; }
.h-stats {
  margin-left: auto; display: flex; gap: 24px;
  font-size: 11px; color: var(--text-dim);
}
.h-stats b { color: var(--text); font-size: 14px; font-weight: 700; }
.h-top1 b  { color: var(--accent); }

/* back button */
#back-btn {
  display: none; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim); font-size: 12px;
  cursor: pointer; font-family: inherit; flex-shrink: 0;
  transition: border-color .15s, color .15s;
}
#back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Chart ── */
#chart-wrap { position: relative; width: 100%; height: calc(100vh - 50px); }
#treemap { display: block; }

/* ── SVG: overview ── */
.l1-bg-hit { cursor: pointer; }
.l1-bg-hit:hover + .l1-bg-fill { opacity: .85; }
.l1-bg-fill { transition: opacity .15s; }
.l1-hint { font-size: 9px; fill: rgba(230,237,243,.3); pointer-events: none;
           font-style: italic; }
.l1-lbl  { font-size: 10px; font-weight: 800; fill: rgba(230,237,243,.78);
           letter-spacing: .07em; text-transform: uppercase; pointer-events: none; }
.l2-lbl  { font-size: 9px; font-weight: 600; fill: rgba(230,237,243,.5);
           pointer-events: none; }
.l3-name { font-size: 10px; font-weight: 600; fill: rgba(230,237,243,.9);
           dominant-baseline: hanging; pointer-events: none; }
.l3-score{ font-size: 14px; font-weight: 800; fill: rgba(255,255,255,.95);
           pointer-events: none; }
.l3-rank { font-size: 9px; fill: rgba(230,237,243,.45); pointer-events: none; }
.l3-cell { cursor: default; }
.l3-cell:hover rect.fill { stroke: var(--accent) !important; stroke-width: 1.5px; }

/* ── SVG: sector view ── */
.sv-l2-bg  { }
.sv-l2-lbl { font-size: 11px; font-weight: 800; fill: rgba(230,237,243,.85);
             letter-spacing: .04em; pointer-events: none; }
.sv-l3-name{ font-size: 11px; font-weight: 700; fill: rgba(230,237,243,.92);
             dominant-baseline: hanging; pointer-events: none; }
.sv-l3-score { font-size: 20px; font-weight: 900; fill: rgba(255,255,255,.96);
               pointer-events: none; }
.sv-l3-rank  { font-size: 10px; fill: rgba(230,237,243,.5); pointer-events: none; }
.sv-chip  { font-size: 9px; fill: rgba(230,237,243,.6); pointer-events: none; }

/* ── Tooltip ── */
#tooltip {
  position: fixed; display: none; pointer-events: none;
  z-index: 999; width: 296px;
  background: #1a2230; border: 1px solid #2d3748;
  border-radius: 10px; padding: 13px 15px;
  font-size: 12px; box-shadow: 0 12px 32px rgba(0,0,0,.7);
}
.tt-name  { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.tt-code  { font-size: 10px; color: var(--text-dim); font-family: monospace; margin-bottom: 10px; }
.tt-score-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 10px; }
.tt-score-val { font-size: 28px; font-weight: 900; line-height: 1; color: var(--accent); }
.tt-score-sub { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
.tt-score-sub .rank { color: var(--text); font-weight: 700; }
.tt-up { color: var(--green); } .tt-dn { color: var(--red); } .tt-nc { color: var(--text-dim); }
.bar-row  { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.bar-lbl  { width: 76px; font-size: 10px; color: var(--text-dim); flex-shrink:0; }
.bar-bg   { flex:1; height:5px; background:#1e2530; border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.bar-val  { width:26px; font-size:10px; color:var(--text-dim); text-align:right; flex-shrink:0; }
.tt-div   { border-top:1px solid #1e2530; margin: 9px 0 8px; }
.tt-chips-lbl { font-size:10px; color:var(--text-dim); margin-bottom:5px; }
.chips    { display:flex; flex-wrap:wrap; gap:4px; }
.chip     { font-size:10px; padding:2px 7px; background:#1e2530; border-radius:5px;
            color:var(--text); border:1px solid #2d3748; }
.tt-inactive { font-size:12px; color:var(--text-dim); margin-bottom:6px; }
/* US 촉매 섹션 */
.tt-us-row   { margin-bottom: 6px; }
.tt-us-ticker { font-size:11px; font-weight:700; font-family:monospace; }
.tt-us-via   { font-size:10px; color:var(--text-dim); line-height:1.5; margin-top:1px; }
</style>

  'L04-CONST':   30,   // 건설 — 주황갈색
  'L05-MACHINERY': 238, // 기계·로봇 — 청보라
  'L06-DEFENSE': 8,    // 방산 — 적등색
  'L07-SHIP':    200,  // 조선 — 바다파랑
  'L08-TRANSPORT': 47, // 운송 — 호박
  'L09-AUTO':    38,   // 자동차 — 황금
  'L10-SEMI':    210,  // 반도체 — 하늘파랑
  'L11-DISPLAY': 260,  // 디스플레이 — 보라
  'L12-NETWORK': 172,  // 통신장비 — 청록
  'L13-SW':      280,  // SW·AI — 자주
  'L14-MEDIA':   322,  // 미디어·엔터 — 분홍
  'L15-CONSUMER': 350, // 소비재 — 장미
  'L16-FOOD':    95,   // 음식료 — 연두
  'L17-PHARMA':  158,  // 제약·바이오 — 녹색
  'L18-MEDTECH': 178,  // 의료기기 — 청록
  'L19-FINANCE': 47,   // 금융 — 금색
};

// ── helpers ────────────────────────────────────────────────
function cellFill(score, l1) {
  const h = HUE[l1] ?? 210;
  if (!score) return `hsl(${h},9%,10%)`;
  const t = Math.min(score / 68, 1);
  return `hsl(${h},${(20+t*60).toFixed(0)}%,${(14+t*38).toFixed(0)}%)`;
}
function l1Of(node) {
  if (node.depth === 1) return node.data.code;
  if (node.depth === 2) return node.parent?.data.code;
  return node.parent?.parent?.data.code;
}
function l1OfSector(node) {
  // in sector view depth=1 is L2, depth=2 is L3 — l1 is stored via activeSector
  return activeSector;
}
function truncate(str, px) {
  const chars = Math.floor(px / 7.2);
  return chars < 4 ? '' : str.length > chars ? str.slice(0, chars-1) + '…' : str;
}

const root = d3.hierarchy(DATA)
  .sum(d => d.value || 0)
  .sort((a,b) => (b.value||0)-(a.value||0));

const svg     = d3.select('#treemap');
const wrap    = document.getElementById('chart-wrap');
const tooltip = document.getElementById('tooltip');
let activeSector = null;

// ── Overview render ────────────────────────────────────────
function goOverview() {
  activeSector = null;
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('h-breadcrumb').innerHTML = '';
  document.getElementById('h-stat-l3').innerHTML  = _statL3Html  || document.getElementById('h-stat-l3').innerHTML;
  document.getElementById('h-stat-top').innerHTML = _statTopHtml || document.getElementById('h-stat-top').innerHTML;
  renderOverview();
}

function goSector(l1Code) {
  const l1Data = DATA.children.find(c => c.code === l1Code);
  if (!l1Data) return;
  activeSector = l1Code;

  document.getElementById('back-btn').style.display = 'flex';
  document.getElementById('h-breadcrumb').innerHTML =
    `<span style="margin:0 4px;color:var(--border)">›</span><b>${l1Data.name}</b>`;

  // update stats for this sector
  const leaves = l1Data.children.flatMap(l2 => l2.children||[]);
  const active = leaves.filter(l=>l.score>0).length;
  const top    = [...leaves].sort((a,b)=>b.score-a.score)[0];
  document.getElementById('h-stat-l3').innerHTML =
    `<b style="font-size:14px">${l1Data.name}</b> · Active <b>${active}</b> / ${leaves.length} L3`;
  document.getElementById('h-stat-top').innerHTML = top && top.score > 0
    ? `Top <b>${top.name}</b> <b style="color:var(--accent)">${top.score}</b>` : '';

  renderSector(l1Data);
}

function renderOverview() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr('width', W).attr('height', H).selectAll('*').remove();

  d3.treemap()
    .size([W, H])
    .paddingOuter(5)
    .paddingTop(d => d.depth===1 ? 19 : d.depth===2 ? 13 : 0)
    .paddingInner(d => d.depth<=1 ? 3 : 1)
    .round(true)(root);

  const g = svg.append('g');
  const l1s = root.children || [];

  // L1 panels — clickable hit rect + fill rect
  l1s.forEach(d => {
    const l1g = g.append('g');
    // fill (visual)
    l1g.append('rect').attr('class','l1-bg-fill')
      .attr('x',d.x0).attr('y',d.y0)
      .attr('width',d.x1-d.x0).attr('height',d.y1-d.y0)
      .attr('fill',`hsl(${HUE[d.data.code]??210},10%,7%)`).attr('rx',4);
    // hit area
    l1g.append('rect').attr('class','l1-bg-hit')
      .attr('x',d.x0).attr('y',d.y0)
      .attr('width',d.x1-d.x0).attr('height',Math.min(19,d.y1-d.y0))
      .attr('fill','transparent')
      .on('click', () => goSector(d.data.code));
  });

  // L1 labels + hint
  g.selectAll('.l1-lbl').data(l1s).join('text').attr('class','l1-lbl')
    .attr('x',d=>d.x0+5).attr('y',d=>d.y0+12)
    .text(d => (d.x1-d.x0)>80 ? d.data.name : d.data.code)
    .style('cursor','pointer')
    .on('click', d => goSector(d.data.code));

  g.selectAll('.l1-hint').data(l1s.filter(d=>(d.x1-d.x0)>120)).join('text')
    .attr('class','l1-hint')
    .attr('x',d=>d.x1-5).attr('y',d=>d.y0+11)
    .attr('text-anchor','end')
    .text('클릭하여 확대');

  // L2 labels
  const l2s = l1s.flatMap(n=>n.children||[]);
  g.selectAll('.l2-lbl').data(l2s.filter(d=>(d.x1-d.x0)>36)).join('text')
    .attr('class','l2-lbl')
    .attr('x',d=>d.x0+4).attr('y',d=>d.y0+10)
    .text(d=>truncate(d.data.name,d.x1-d.x0-8));

  // L3 leaves
  const W3=d=>Math.max(0,d.x1-d.x0), H3=d=>Math.max(0,d.y1-d.y0);
  const cellG = g.selectAll('.l3-cell').data(root.leaves()).join('g')
    .attr('class','l3-cell').attr('transform',d=>`translate(${d.x0},${d.y0})`);

  cellG.append('rect').attr('class','fill')
    .attr('width',W3).attr('height',H3)
    .attr('fill',d=>cellFill(d.data.score,l1Of(d)))
    .attr('rx',2).attr('stroke','transparent')
    .on('mousemove',(ev,d)=>ttShow(ev,d,l1Of(d)))
    .on('mouseleave',ttHide);

  cellG.filter(d=>d.data.rank&&d.data.rank<=10).append('rect')
    .attr('width',W3).attr('height',H3).attr('fill','none')
    .attr('stroke','#e3b341').attr('stroke-width',1.5)
    .attr('rx',2).attr('pointer-events','none');

  cellG.filter(d=>W3(d)>46&&H3(d)>26).append('text').attr('class','l3-name')
    .attr('x',5).attr('y',4).text(d=>truncate(d.data.name,W3(d)-10));

  cellG.filter(d=>d.data.score>0&&W3(d)>38&&H3(d)>44).append('text').attr('class','l3-score')
    .attr('x',d=>W3(d)/2).attr('y',d=>H3(d)/2+6)
    .attr('text-anchor','middle').attr('dominant-baseline','middle').text(d=>d.data.score);

  cellG.filter(d=>d.data.rank&&d.data.rank<=20&&W3(d)>30&&H3(d)>18).append('text')
    .attr('class','l3-rank').attr('x',d=>W3(d)-4).attr('y',4)
    .attr('text-anchor','end').attr('dominant-baseline','hanging').text(d=>`#${d.data.rank}`);
}

// ── Sector render ──────────────────────────────────────────
function renderSector(l1Data) {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr('width',W).attr('height',H).selectAll('*').remove();

  const l1Code = l1Data.code;
  const h = HUE[l1Code] ?? 210;

  // rebuild sub-hierarchy (L2 → L3)
  const subRoot = d3.hierarchy({ name: l1Data.name, children: l1Data.children })
    .sum(d => d.value || 0)
    .sort((a,b) => (b.value||0)-(a.value||0));

  d3.treemap()
    .size([W, H])
    .paddingOuter(6)
    .paddingTop(d => d.depth===1 ? 24 : 0)
    .paddingInner(d => d.depth===1 ? 4 : 2)
    .round(true)(subRoot);

  const g = svg.append('g');
  const l2s = subRoot.children || [];

  // L2 background
  g.selectAll('.sv-l2-bg').data(l2s).join('rect').attr('class','sv-l2-bg')
    .attr('x',d=>d.x0).attr('y',d=>d.y0)
    .attr('width',d=>d.x1-d.x0).attr('height',d=>d.y1-d.y0)
    .attr('fill',`hsl(${h},12%,8%)`).attr('rx',5);

  // L2 labels
  g.selectAll('.sv-l2-lbl').data(l2s).join('text').attr('class','sv-l2-lbl')
    .attr('x',d=>d.x0+7).attr('y',d=>d.y0+15)
    .text(d => {
      const w = d.x1-d.x0;
      return w < 80 ? d.data.name.slice(0,6) : d.data.name;
    });

  // L3 leaves
  const W3=d=>Math.max(0,d.x1-d.x0), H3=d=>Math.max(0,d.y1-d.y0);
  const cellG = g.selectAll('.l3-cell').data(subRoot.leaves()).join('g')
    .attr('class','l3-cell').attr('transform',d=>`translate(${d.x0},${d.y0})`);

  cellG.append('rect').attr('class','fill')
    .attr('width',W3).attr('height',H3)
    .attr('fill',d=>cellFill(d.data.score, l1Code))
    .attr('rx',3).attr('stroke','transparent')
    .on('mousemove',(ev,d)=>ttShow(ev,d,l1Code))
    .on('mouseleave',ttHide);

  // top-10 gold border
  cellG.filter(d=>d.data.rank&&d.data.rank<=10).append('rect')
    .attr('width',W3).attr('height',H3).attr('fill','none')
    .attr('stroke','#e3b341').attr('stroke-width',2)
    .attr('rx',3).attr('pointer-events','none');

  // L3 name — larger text
  cellG.filter(d=>W3(d)>50&&H3(d)>28).append('text').attr('class','sv-l3-name')
    .attr('x',7).attr('y',6).text(d=>truncate(d.data.name,W3(d)-14));

  // score — large center
  cellG.filter(d=>d.data.score>0&&W3(d)>50&&H3(d)>55).append('text').attr('class','sv-l3-score')
    .attr('x',d=>W3(d)/2).attr('y',d=>H3(d)/2+8)
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .text(d=>d.data.score);

  // rank badge
  cellG.filter(d=>d.data.rank&&W3(d)>36&&H3(d)>22).append('text').attr('class','sv-l3-rank')
    .attr('x',d=>W3(d)-5).attr('y',5)
    .attr('text-anchor','end').attr('dominant-baseline','hanging').text(d=>`#${d.data.rank}`);

  // inline stock chips for large cells
  cellG.filter(d=>W3(d)>90&&H3(d)>80&&d.data.active_stocks.length>0).each(function(d) {
    const cg = d3.select(this);
    const chips = d.data.active_stocks.slice(0,3);
    const yBase = H3(d) - 6 - chips.length * 13;
    chips.forEach((code, i) => {
      const nm = SN[code] || code;
      cg.append('text').attr('class','sv-chip')
        .attr('x', 7).attr('y', yBase + i * 13)
        .text(nm.length > 7 ? nm.slice(0,7)+'…' : nm);
    });
  });
}

// ── Tooltip ───────────────────────────────────────────────
function ttShow(ev, d, l1Override) {
  const nd = d.data;
  const l1 = l1Override ?? l1Of(d);
  const h  = HUE[l1] ?? 210;
  const col = `hsl(${h},65%,55%)`;

  const delta = (() => {
    if (!nd.delta) return `<span class="tt-nc">─</span>`;
    return nd.delta>0
      ? `<span class="tt-up">▲${nd.delta}</span>`
      : `<span class="tt-dn">▼${Math.abs(nd.delta)}</span>`;
  })();

  const chips = nd.active_stocks.map(c=>
    `<span class="chip">${SN[c]||c}</span>`).join('');

  const usBlock = (() => {
    if (!nd.us_triggers || !nd.us_triggers.length) return '';
    const rows = nd.us_triggers.map(t => {
      const pct = t.change_pct >= 0 ? `+${t.change_pct}%` : `${t.change_pct}%`;
      const cls = t.change_pct >= 0 ? 'tt-up' : 'tt-dn';
      return `<div class="tt-us-row">
        <span class="tt-us-ticker ${cls}">${t.ticker} ${pct}</span>
        <div class="tt-us-via">${t.via}</div>
      </div>`;
    }).join('');
    return `<div class="tt-div"></div><div class="tt-chips-lbl">US 촉매</div>${rows}`;
  })();

  const scoreBlock = nd.score > 0 ? `
    <div class="tt-score-row">
      <span class="tt-score-val">${nd.score}</span>
      <div class="tt-score-sub">
        ${nd.rank ? `<span class="rank">#${nd.rank} 순위</span><br>` : ''}전일 대비 ${delta}
      </div>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">테마빈도 35%</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${nd.sc_theme}%;background:${col}"></div></div>
      <span class="bar-val">${nd.sc_theme}</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">종목등락 30%</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${nd.sc_stock}%;background:#79c0ff"></div></div>
      <span class="bar-val">${nd.sc_stock}</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">수급 20%</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${nd.sc_supply}%;background:#3fb950"></div></div>
      <span class="bar-val">${nd.sc_supply}</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">US촉매 10%</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${nd.sc_us}%;background:#f0883e"></div></div>
      <span class="bar-val">${nd.sc_us}</span>
    </div>
  ` : `<div class="tt-inactive">비활성 (score 0)</div>`;

  tooltip.innerHTML = `
    <div class="tt-name">${nd.name}</div>
    <div class="tt-code">${nd.code}</div>
    ${scoreBlock}
    ${usBlock}
    ${chips ? `<div class="tt-div"></div><div class="tt-chips-lbl">활성 종목</div><div class="chips">${chips}</div>` : ''}
  `;

  let x = ev.clientX+18, y = ev.clientY+10;
  if (x+296 > window.innerWidth-8)  x = ev.clientX-306;
  if (y+400 > window.innerHeight-8) y = ev.clientY-410;
  tooltip.style.cssText += `;display:block;left:${x}px;top:${y}px`;
}
function ttHide() { tooltip.style.display='none'; }

// ── Init ──────────────────────────────────────────────────
// 전체 뷰 stats 원본 HTML 저장 — back 버튼 클릭 시 goOverview() 가 복원
const _statL3Html  = document.getElementById('h-stat-l3').innerHTML;
const _statTopHtml = document.getElementById('h-stat-top').innerHTML;

renderOverview();
window.addEventListener('resize', () => activeSector
  ? renderSector(DATA.children.find(c=>c.code===activeSector))
  : renderOverview());
</script>
</body>
